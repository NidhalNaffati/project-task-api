name: Deploy to GCP (Cloud Run)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy (build/push image + Cloud Run deploy)
        env:
          # Non-secret config should be GitHub Environment Variables
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          AR_REPO: ${{ vars.AR_REPO }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          DB_INSTANCE_NAME: ${{ vars.DB_INSTANCE_NAME }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          CLOUD_SQL_CONNECTION_NAME: ${{ vars.CLOUD_SQL_CONNECTION_NAME }}

          # Secrets
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

          # Release identifier
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x ./deploy-app.sh
          ./deploy-app.sh
